name: wenatv
description: "A premium Google TV and Android TV streaming app."
publish_to: 'none'

version: 2.1.0+3

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  dio: ^5.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.2.0
  firebase_analytics: ^12.3.0
  intl: ^0.20.2
  media_kit_libs_android_video: ^1.3.8
  flutter_js: ^0.8.7
  url_launcher: ^6.3.2
  video_player: ^2.11.1
  html: ^0.15.6
  wakelock_plus: ^1.5.2
  youtube_player_iframe: ^5.2.2
  dio_smart_retry: ^6.0.0
  connectivity_plus: ^6.1.4
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/branding/startuplogo.png
    - assets/animations/boot_logo_animation.mp4
    - assets/animations/boot_logo_animation_tv.mp4
    - assets/animations/boot_logo_poster.jpg

flutter_native_splash:
  color: "#050505"
  image: assets/branding/startuplogo.png
  color_dark: "#050505"
  image_dark: assets/branding/startuplogo.png
  android: true
  ios: false
  web: false
  fullscreen: true
  android_gravity: center
  android_12:
    color: "#050505"
    image: assets/branding/startuplogo.png
    color_dark: "#050505"
    image_dark: assets/branding/startuplogo.png
